services:
    webui:
      build:
        context: .
        dockerfile: Dockerfile
      ports:
        - "8501:8501" 
      command: [ "streamlit", "run", "./webui/Main.py", "--server.enableCORS=True", "--browser.gatherUsageStats=False" ]
      volumes:
        - mpt-storage:/MoneyPrinterTurbo/storage
      restart: always

    api:
      build:
        context: .
        dockerfile: Dockerfile
      ports:
        - "8081:8080"
      command: [ "python3", "main.py" ]
      volumes:
        - mpt-storage:/MoneyPrinterTurbo/storage
      restart: always

volumes:
    - mpt-storage:/MoneyPrinterTurbo/storage
    - ./config.toml:/MoneyPrinterTurbo/config.toml
